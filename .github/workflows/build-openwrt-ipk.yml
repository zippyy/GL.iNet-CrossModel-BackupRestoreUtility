name: Build and Release OpenWrt IPK

on:
  workflow_dispatch:
  push:
    branches:
      - OpenWRT
    paths:
      - 'openwrt/**'
      - 'scripts/build-openwrt-ipk.sh'
      - '.github/workflows/build-openwrt-ipk.yml'

permissions:
  contents: write

concurrency:
  group: build-openwrt-ipk
  cancel-in-progress: false

jobs:
  build-ipk:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Build standalone IPK
        run: |
          chmod +x scripts/build-openwrt-ipk.sh
          scripts/build-openwrt-ipk.sh

      - name: Inspect package
        run: |
          ls -lh dist/*.ipk
          ar t dist/*.ipk
          mkdir -p inspect/control inspect/data
          cp dist/*.ipk inspect/package.ipk
          cd inspect
          ar x package.ipk
          tar -tzf control.tar.gz
          tar -tzf data.tar.gz | sed -n '1,80p'

      - name: Set release metadata
        id: release
        shell: bash
        run: |
          makefile='openwrt/luci-app-glinet-crossmodel-backup/Makefile'
          version="$(sed -n 's/^PKG_VERSION:=//p' "$makefile" | head -n 1)"
          release="$(sed -n 's/^PKG_RELEASE:=//p' "$makefile" | head -n 1)"
          test -n "$version"
          test -n "$release"

          tag="openwrt-v${version}-build.${GITHUB_RUN_NUMBER}"
          title="GL.iNet Cross-Model Backup / Restore ${version}-${release} — OpenWrt build ${GITHUB_RUN_NUMBER}"

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "title=$title" >> "$GITHUB_OUTPUT"

      - name: Upload IPK artifact
        uses: actions/upload-artifact@v4
        with:
          name: glinet-crossmodel-backup-openwrt-ipk
          path: dist/*.ipk
          if-no-files-found: error
          retention-days: 90

      - name: Publish GitHub prerelease
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          RELEASE_TITLE: ${{ steps.release.outputs.title }}
        run: |
          gh release create "$RELEASE_TAG" dist/*.ipk \
            --target "$GITHUB_SHA" \
            --title "$RELEASE_TITLE" \
            --notes "Automated native OpenWrt IPK build from commit $GITHUB_SHA. This IPK is architecture-independent, but install it only on a GL.iNet/OpenWrt router with compatible package feeds for its declared dependencies." \
            --prerelease
