name: Build OpenWrt IPK

on:
  workflow_dispatch:
  push:
    branches: [OpenWRT]
    paths:
      - 'openwrt/**'
      - 'scripts/build-openwrt-ipk.sh'
      - '.github/workflows/build-openwrt-ipk.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build IPK
        run: |
          chmod +x scripts/build-openwrt-ipk.sh
          scripts/build-openwrt-ipk.sh
      - name: Verify IPK container
        run: |
          set -e
          ipk=$(find dist -name '*.ipk' -type f | head -n1)
          test -n "$ipk"
          test "$(ar t "$ipk" | tr '\n' ' ')" = 'debian-binary control.tar.gz data.tar.gz '
          test "$(ar p "$ipk" debian-binary)" = '2.0'
          ar p "$ipk" control.tar.gz | tar -xOzf - ./control | grep -qx 'Package: luci-app-glinet-crossmodel-backup'
          ar p "$ipk" data.tar.gz | tar -tzf - | grep -q '^./usr/libexec/glinet-crossmodel-backup$'
          ar p "$ipk" data.tar.gz | tar -tzf - | grep -q '^./usr/libexec/glinet-crossmodel-remote$'
      - uses: actions/upload-artifact@v4
        with:
          name: glinet-crossmodel-backup-ipk
          path: dist/*.ipk
          if-no-files-found: error
          retention-days: 90
