name: Build GL.iNet IPK

on:
  workflow_dispatch:
  push:
    branches: [OpenWRT]
    paths:
      - 'openwrt/**'
      - 'scripts/build-openwrt-ipk.sh'
      - '.github/workflows/build-openwrt-ipk.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build package
        run: |
          chmod +x scripts/build-openwrt-ipk.sh
          scripts/build-openwrt-ipk.sh

      - name: Inspect package
        run: |
          set -e
          ls -lh dist
          tar -tzf dist/*.ipk

      - uses: actions/upload-artifact@v4
        with:
          name: glinet-crossmodel-backup-ipk
          path: dist/*
          if-no-files-found: error
          retention-days: 90
