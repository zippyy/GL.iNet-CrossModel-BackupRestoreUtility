name: Release GL.iNet IPK

on:
  workflow_dispatch:
  push:
    branches: [OpenWRT]
    paths:
      - 'scripts/**'
      - 'openwrt/**'
      - '.github/workflows/release-v9.yml'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build package
        run: |
          chmod +x scripts/build-openwrt-ipk.sh
          scripts/build-openwrt-ipk.sh || test -f dist/luci-app-glinet-crossmodel-backup_1.1.0-9_all.ipk
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.1.0-9
          name: GL.iNet Cross-Model Backup 1.1.0-9
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: |
            dist/*.ipk
            dist/*.ipk.sha256
